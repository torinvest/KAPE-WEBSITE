<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Notifications</title>
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<main class="layout">
  <aside class="side">
    <a href="/admin.html">Dashboard</a>
    <a href="/clients.html">Clients</a>
    <a href="/orders.html">Commandes</a>
    <a href="/imports.html">Imports</a>
    <a href="/documents.html">Documents</a>
    <a href="/sav-admin.html">SAV Admin</a>
    <a href="/audit.html">Audit Logs</a>
    <a href="/notifications.html" class="active">Notifications</a>
  </aside>

  <section>
    <h1>Notifications</h1>
    <div id="notificationsBox">Chargement...</div>
  </section>
</main>

<script src="/assets/js/app.js"></script>
<script>
async function loadNotifications(){
  const rows = await api('/api/admin/notifications');
  document.querySelector('#notificationsBox').innerHTML = `
    <table class="table">
      <tr><th>ID</th><th>Type</th><th>Destinataire</th><th>Sujet</th><th>Statut</th></tr>
      ${rows.map(n=>`
        <tr>
          <td>${n.id}</td>
          <td>${n.type}</td>
          <td>${n.recipient}</td>
          <td>${n.subject}</td>
          <td>${n.status}</td>
        </tr>
      `).join('')}
    </table>
  `;
}
loadNotifications().catch(e=>{
  document.querySelector('#notificationsBox').innerHTML = '<div class="card">Erreur : '+e.message+'</div>';
});
</script>

</body>
</html>
